name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag_version}" ]; then
            echo "::error::Tag ${tag_version} does not match package.json version v${pkg_version}." \
                 "Bump package.json (the update-notice check reads it) and re-tag."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config --global user.email "ci@harness.release"
          git config --global user.name "Harness Release"

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Package release tarball and checksum
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="thanos-${{ github.ref_name }}/" \
            -o "dist/thanos-${{ github.ref_name }}.tar.gz" "${{ github.sha }}"
          (cd dist && sha256sum "thanos-${{ github.ref_name }}.tar.gz" > SHA256SUMS)

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/thanos-${{ github.ref_name }}.tar.gz \
            dist/SHA256SUMS \
            --title "Thanos ${{ github.ref_name }}" \
            --generate-notes
