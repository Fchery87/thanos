name: Prompt Evaluations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  deterministic:
    name: Deterministic prompt evals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:prompts
      - run: bun run test:unit tests/prompts/graders.test.ts tests/prompts/dataset.test.ts

  modeled:
    name: Modeled prompt evals
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: mkdir -p .harness/evals
      - run: bun run eval:prompts > .harness/evals/prompt-evals.json
      - uses: actions/upload-artifact@v4
        with:
          name: prompt-evals
          path: .harness/evals/prompt-evals.json
